<!DOCTYPE html>
<html>
<head>
  <title>Supabase Test</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>
  <h1>Supabase Connection Test</h1>
  <div id="result">Testing...</div>
  
  <script>
    const SUPABASE_URL = 'https://rtbqaqkobwwjnbzwvjab.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ0YnFhcWtvYnd3am5iend2amFiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyNDE2ODAsImV4cCI6MjA4ODgxNzY4MH0.EUnSeOMf3U6Uentgo1gcq-PfTgTI35SN92Vr9mdNO0Y';
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    
    async function testConnection() {
      try {
        // Test users table
        const { data: users, error: usersError } = await supabase
          .from('users')
          .select('*')
          .limit(5);
        
        if (usersError) throw usersError;
        
        // Test trades table
        const { data: trades, error: tradesError } = await supabase
          .from('trades')
          .select('*')
          .limit(5);
        
        if (tradesError) throw tradesError;
        
        // Test leaderboard table
        const { data: leaderboard, error: lbError } = await supabase
          .from('leaderboard')
          .select('*')
          .limit(5);
        
        if (lbError) throw lbError;
        
        document.getElementById('result').innerHTML = `
          <h2>✅ Connection Successful!</h2>
          <p><strong>Users table:</strong> ${users.length} rows found</p>
          <pre>${JSON.stringify(users[0], null, 2)}</pre>
          <p><strong>Trades table:</strong> ${trades.length} rows found</p>
          <pre>${JSON.stringify(trades[0], null, 2)}</pre>
          <p><strong>Leaderboard table:</strong> ${leaderboard.length} rows found</p>
          <pre>${JSON.stringify(leaderboard[0], null, 2)}</pre>
        `;
      } catch (error) {
        document.getElementById('result').innerHTML = `
          <h2>❌ Error</h2>
          <p>${error.message}</p>
          <pre>${JSON.stringify(error, null, 2)}</pre>
        `;
      }
    }
    
    testConnection();
  </script>
</body>
</html>
